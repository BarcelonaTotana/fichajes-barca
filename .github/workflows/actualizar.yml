name: Actualizar fichajes

# Cuándo se ejecuta:
on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos (equilibrio: frescura sin saturar Google News).
  workflow_dispatch: {}        # botón para lanzarlo a mano desde la pestaña Actions
  push:
    branches: [ main ]         # también al subir cambios

# Permite al workflow escribir en el repo (guardar el JSON actualizado)
permissions:
  contents: write

# Evita solapes si una ejecución tarda
concurrency:
  group: fichajes
  cancel-in-progress: false

jobs:
  recolectar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar recolector
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python recolector.py

      - name: Guardar cambios (si hay noticias nuevas)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fichajes.json
          if git diff --cached --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "Actualizar fichajes ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
