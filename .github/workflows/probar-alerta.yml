name: Probar alerta Telegram

# Herramienta manual: pulsa "Run workflow" para enviarte una alerta de prueba.
on:
  workflow_dispatch: {}

jobs:
  probar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Enviar alerta de prueba
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python herramientas/probar_alerta.py
