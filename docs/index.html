<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercado de Fichajes · FC Barcelona</title>
<style>
  :root{
    --blau:#004D98; --grana:#A50044; --oro:#EDBB00;
    --bg:#f5f6f8; --panel:#fff; --texto:#111418; --suave:#6b7280; --linea:#e6e8ec; --chip:#f0f2f5;
    --ofi:#EDBB00; --hwg:#0e8f4f; --avz:#2f7fd1; --rum:#9aa2ad;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0d1015; --panel:#161b22; --texto:#e9ecef; --suave:#9aa2ad; --linea:#252c36; --chip:#1f262f; }
  }
  :root[data-theme="light"]{ --bg:#f5f6f8; --panel:#fff; --texto:#111418; --suave:#6b7280; --linea:#e6e8ec; --chip:#f0f2f5; }
  :root[data-theme="dark"]{ --bg:#0d1015; --panel:#161b22; --texto:#e9ecef; --suave:#9aa2ad; --linea:#252c36; --chip:#1f262f; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--texto);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  header{background:linear-gradient(120deg,var(--blau),var(--grana));color:#fff;padding:22px 16px}
  header .in{max-width:820px;margin:0 auto}
  h1{margin:0;font-size:1.2rem;font-weight:800;display:flex;gap:8px;align-items:center}
  .stats{margin-top:6px;font-size:.8rem;opacity:.92;display:flex;gap:14px;flex-wrap:wrap}
  .stats b{font-weight:700}
  main{max-width:820px;margin:0 auto;padding:14px 12px 60px}
  .toolbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0 8px}
  .search{width:100%;padding:11px 14px;border:1px solid var(--linea);border-radius:12px;
          background:var(--panel);color:var(--texto);font-size:.92rem;outline:none}
  .search:focus{border-color:var(--blau)}
  .rows{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--suave);min-width:70px;font-weight:700}
  .pill{border:1px solid var(--linea);background:var(--panel);color:var(--texto);
        padding:6px 12px;border-radius:999px;font-size:.8rem;cursor:pointer;transition:.12s;white-space:nowrap}
  .pill.on{background:var(--blau);color:#fff;border-color:var(--blau)}
  .count{color:var(--suave);font-size:.78rem;margin:14px 2px 8px}
  .card{background:var(--panel);border:1px solid var(--linea);border-radius:14px;
        padding:13px 15px 13px 17px;position:relative;overflow:hidden}
  .card+.card{margin-top:9px}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rum)}
  .card.e-oficial::before{background:var(--ofi)} .card.e-here_we_go::before{background:var(--hwg)}
  .card.e-avanzado::before{background:var(--avz)} .card.e-rumor::before{background:var(--rum)}
  .top{display:flex;align-items:center;gap:10px}
  .ttl{font-weight:650;font-size:1rem;flex:1;min-width:0}
  .ttl a{color:inherit;text-decoration:none}
  .ttl a:hover{text-decoration:underline}
  .prob{flex-shrink:0;font-weight:800;font-size:.95rem;padding:3px 9px;border-radius:8px;color:#fff}
  .meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px;font-size:.75rem}
  .tag{padding:2px 9px;border-radius:6px;font-weight:700}
  .est{color:#fff}
  .fee{background:var(--chip);color:var(--texto);border:1px solid var(--linea);font-weight:800}
  .cat{background:transparent;color:var(--suave);border:1px solid var(--linea)}
  .club{color:var(--suave)} .time{color:var(--suave);margin-left:auto}
  .empty{text-align:center;color:var(--suave);padding:48px 12px}
  footer{max-width:820px;margin:14px auto 0;padding:0 14px 40px;color:var(--suave);font-size:.7rem;text-align:center}
</style>
</head>
<body>
<header><div class="in">
  <h1>🔵🔴 Mercado de Fichajes · FC Barcelona</h1>
  <div class="stats" id="stats">Cargando…</div>
</div></header>
<main>
  <div class="toolbar">
    <input class="search" id="q" type="search" placeholder="🔎 Buscar jugador o club…" autocomplete="off">
    <div class="rows">
      <div class="row" id="fCat"><span class="lbl">Equipo</span>
        <button class="pill on" data-cat="todo">Todo</button>
        <button class="pill" data-cat="primer_equipo">⭐ Primer equipo</button>
        <button class="pill" data-cat="barca_atletic">🅱️ Barça Atlètic</button></div>
      <div class="row" id="fTipo"><span class="lbl">Tipo</span>
        <button class="pill on" data-tipo="todo">Todo</button>
        <button class="pill" data-tipo="rumor">💬 Rumores</button>
        <button class="pill" data-tipo="llegada">🟢 Llegadas</button>
        <button class="pill" data-tipo="salida">🔴 Salidas</button></div>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div id="list"></div>
</main>
<footer>Datos: Transfermarkt (rumores con probabilidad real + fichajes/ventas cerrados). Proyecto de aficionado, no oficial.</footer>
<script>
const LEG={oficial:"✅ Oficial",here_we_go:"🤝 Muy avanzado",avanzado:"🔜 Avanzado",rumor:"💬 Rumor"};
const COL={oficial:"var(--ofi)",here_we_go:"var(--hwg)",avanzado:"var(--avz)",rumor:"var(--rum)"};
let DATOS=[], fCat="todo", fTipo="todo", q="";
function fecha(iso){try{const d=new Date(iso.replace('Z',''));
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}catch(e){return''}}
function probColor(p){ if(p>=80)return"#0e8f4f"; if(p>=55)return"#2f7fd1"; if(p>=30)return"#e08a2b"; return"#9aa2ad"; }
function render(){
  const list=document.getElementById('list'), ql=q.trim().toLowerCase();
  let f=DATOS.filter(n=>
    (fCat==="todo"||n.categoria===fCat) &&
    (fTipo==="todo"||n.tipo===fTipo) &&
    (!ql||((n.jugador||'')+' '+(n.club||'')).toLowerCase().includes(ql)));
  document.getElementById('count').textContent=`${f.length} resultado${f.length===1?'':'s'}`;
  if(!f.length){list.innerHTML='<div class="empty">Sin resultados con estos filtros.</div>';return;}
  list.innerHTML=f.map(n=>{
    const prob=(n.tipo==='rumor'&&n.probabilidad!=null)
      ? `<span class="prob" style="background:${probColor(n.probabilidad)}">${n.probabilidad}%</span>`:'';
    const club=n.club?`<span class="club">${n.tipo==='rumor'?'🔁 ':''}${n.club}</span>`:'';
    return `<div class="card e-${n.estado}">
      <div class="top">
        <div class="ttl"><a href="${n.enlace}" target="_blank" rel="noopener">${n.titulo}</a></div>
        ${prob}
      </div>
      <div class="meta">
        <span class="tag est" style="background:${COL[n.estado]}">${LEG[n.estado]||n.estado}</span>
        ${n.importe?`<span class="tag fee">${n.importe}</span>`:''}
        ${club}
        <span class="tag cat">${n.categoria==='barca_atletic'?'🅱️ Atlètic':'⭐ 1er equipo'}</span>
        <span class="time">${fecha(n.fecha)}</span>
      </div></div>`;}).join('');
}
function seg(g,a,v){document.querySelectorAll(`#${g} .pill`).forEach(b=>b.classList.toggle('on',b.dataset[a]===String(v)));}
document.getElementById('fCat').onclick=e=>{const v=e.target.dataset.cat;if(v){fCat=v;seg('fCat','cat',v);render();}};
document.getElementById('fTipo').onclick=e=>{const v=e.target.dataset.tipo;if(v){fTipo=v;seg('fTipo','tipo',v);render();}};
document.getElementById('q').oninput=e=>{q=e.target.value;render();};
fetch('fichajes.json?_='+Date.now()).then(r=>r.json()).then(d=>{
  DATOS=d.noticias||[];
  const pe=DATOS.filter(n=>n.categoria==='primer_equipo').length;
  document.getElementById('stats').innerHTML=
    `<span><b>${DATOS.length}</b> movimientos</span>`+
    `<span>⭐ <b>${pe}</b> primer equipo</span>`+
    `<span>🅱️ <b>${DATOS.length-pe}</b> Atlètic</span>`+
    `<span>Actualizado ${d.actualizado?fecha(d.actualizado):'—'}</span>`;
  render();
}).catch(()=>{document.getElementById('stats').textContent='Aún no hay datos.';});
</script>
</body>
</html>
