<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercado de Fichajes · FC Barcelona</title>
<style>
  :root{
    --blau:#004D98; --grana:#A50044; --oro:#EDBB00;
    --bg:#f5f6f8; --panel:#ffffff; --texto:#111418; --suave:#6b7280;
    --linea:#e6e8ec; --chip:#f0f2f5;
    --t0:#EDBB00; --t1:#1a8f3c; --t2:#2f7fd1; --t3:#9aa2ad; --t4:#e08a2b; --t5:#d64545;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0d1015; --panel:#161b22; --texto:#e9ecef; --suave:#9aa2ad;
           --linea:#252c36; --chip:#1f262f; }
  }
  :root[data-theme="light"]{ --bg:#f5f6f8; --panel:#fff; --texto:#111418; --suave:#6b7280; --linea:#e6e8ec; --chip:#f0f2f5; }
  :root[data-theme="dark"]{ --bg:#0d1015; --panel:#161b22; --texto:#e9ecef; --suave:#9aa2ad; --linea:#252c36; --chip:#1f262f; }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--texto);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       line-height:1.5;-webkit-text-size-adjust:100%}

  header{background:linear-gradient(120deg,var(--blau),var(--grana));color:#fff;padding:22px 16px}
  header .in{max-width:820px;margin:0 auto}
  h1{margin:0;font-size:1.2rem;font-weight:800;letter-spacing:.2px;display:flex;gap:8px;align-items:center}
  .stats{margin-top:6px;font-size:.8rem;opacity:.92;display:flex;gap:14px;flex-wrap:wrap}
  .stats b{font-weight:700}

  main{max-width:820px;margin:0 auto;padding:14px 12px 60px}

  .toolbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0 8px}
  .search{width:100%;padding:11px 14px;border:1px solid var(--linea);border-radius:12px;
          background:var(--panel);color:var(--texto);font-size:.92rem;outline:none}
  .search:focus{border-color:var(--blau)}
  .rows{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--suave);
       min-width:64px;font-weight:700}
  .pill{border:1px solid var(--linea);background:var(--panel);color:var(--texto);
        padding:6px 12px;border-radius:999px;font-size:.8rem;cursor:pointer;transition:.12s;white-space:nowrap}
  .pill:hover{border-color:var(--suave)}
  .pill.on{background:var(--blau);color:#fff;border-color:var(--blau)}
  .pill.on.g{background:var(--grana);border-color:var(--grana)}

  .count{color:var(--suave);font-size:.78rem;margin:14px 2px 8px}

  .card{background:var(--panel);border:1px solid var(--linea);border-radius:14px;
        padding:13px 15px 13px 17px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--t3)}
  .card.tier0::before{background:var(--t0)} .card.tier1::before{background:var(--t1)}
  .card.tier2::before{background:var(--t2)} .card.tier3::before{background:var(--t3)}
  .card.tier4::before{background:var(--t4)} .card.tier5::before{background:var(--t5)}
  .card + .card{margin-top:9px}
  .ttl{font-weight:650;font-size:.98rem;letter-spacing:-.1px}
  .ttl a{color:inherit;text-decoration:none}
  .ttl a:hover{text-decoration:underline}
  .meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px;font-size:.74rem}
  .tag{padding:2px 9px;border-radius:6px;font-weight:700;letter-spacing:.2px}
  .rel{color:#fff}
  .rel0{background:var(--t0);color:#3a2e00} .rel1{background:var(--t1)} .rel2{background:var(--t2)}
  .rel3{background:var(--chip);color:var(--suave)} .rel4{background:var(--t4)} .rel5{background:var(--t5)}
  .est{background:var(--chip);color:var(--texto);border:1px solid var(--linea)}
  .cat{background:transparent;color:var(--suave);border:1px solid var(--linea)}
  .src{color:var(--suave)} .time{color:var(--suave);margin-left:auto}

  .empty{text-align:center;color:var(--suave);padding:48px 12px;font-size:.9rem}
  .legend{max-width:820px;margin:22px auto 0;padding:0 14px;color:var(--suave);
          font-size:.72rem;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  footer{max-width:820px;margin:14px auto 0;padding:0 14px 40px;color:var(--suave);
         font-size:.7rem;text-align:center}
</style>
</head>
<body>
<header><div class="in">
  <h1>🔵🔴 Mercado de Fichajes · FC Barcelona</h1>
  <div class="stats" id="stats">Cargando…</div>
</div></header>

<main>
  <div class="toolbar">
    <input class="search" id="q" type="search" placeholder="🔎 Buscar jugador, club o medio…" autocomplete="off">
    <div class="rows">
      <div class="row" id="fCat">
        <span class="lbl">Categoría</span>
        <button class="pill on" data-cat="todo">Todo</button>
        <button class="pill" data-cat="primer_equipo">⭐ Primer equipo</button>
        <button class="pill" data-cat="barca_atletic">🅱️ Barça Atlètic</button>
      </div>
      <div class="row" id="fEst">
        <span class="lbl">Estado</span>
        <button class="pill on" data-est="todo">Todo</button>
        <button class="pill" data-est="oficial">✅ Oficial</button>
        <button class="pill" data-est="avanzado">🔜 Avanzado</button>
        <button class="pill" data-est="rumor">💬 Rumor</button>
      </div>
      <div class="row" id="fTier">
        <span class="lbl">Fuente</span>
        <button class="pill g on" data-tier="9">Todas</button>
        <button class="pill g" data-tier="2">Solo fiables</button>
      </div>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div id="list"></div>
</main>

<div class="legend">
  <span><i class="dot" style="background:var(--t0)"></i>Oficial</span>
  <span><i class="dot" style="background:var(--t1)"></i>Fiable</span>
  <span><i class="dot" style="background:var(--t2)"></i>Bastante fiable</span>
  <span><i class="dot" style="background:var(--t3)"></i>Verificar</span>
  <span><i class="dot" style="background:var(--t4)"></i>Poco fiable</span>
  <span><i class="dot" style="background:var(--t5)"></i>Ruido</span>
</div>
<footer>Ordenado por fecha · fiabilidad basada en el medio · datos vía Google News. Proyecto de aficionado, no oficial.</footer>

<script>
const ETIQ={0:"Oficial",1:"Fiable",2:"Bastante fiable",3:"Verificar",4:"Poco fiable",5:"Ruido"};
const ESTADO={oficial:"✅ Oficial",here_we_go:"🤝 Acuerdo total",avanzado:"🔜 Avanzado",rumor:"💬 Rumor"};
const EST_GRUPO={oficial:"oficial",here_we_go:"oficial",avanzado:"avanzado",rumor:"rumor"};
let DATOS=[], fCat="todo", fEst="todo", fTier=9, q="";

function fecha(iso){try{const d=new Date(iso.replace('Z',''));
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' · '+
         d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}catch(e){return''}}

function render(){
  const list=document.getElementById('list');
  const ql=q.trim().toLowerCase();
  let f=DATOS.filter(n=>
    (fCat==="todo"||n.categoria===fCat) &&
    (fEst==="todo"||EST_GRUPO[n.estado]===fEst) &&
    n.tier<=fTier &&
    (!ql||(n.titulo+' '+n.medio).toLowerCase().includes(ql))
  );
  document.getElementById('count').textContent=`${f.length} noticia${f.length===1?'':'s'}`;
  if(!f.length){list.innerHTML='<div class="empty">Sin resultados con estos filtros.</div>';return;}
  list.innerHTML=f.map(n=>`
    <div class="card tier${n.tier}">
      <div class="ttl"><a href="${n.enlace}" target="_blank" rel="noopener">${n.titulo}</a></div>
      <div class="meta">
        <span class="tag rel rel${n.tier}">${ETIQ[n.tier]||'?'}</span>
        <span class="tag est">${ESTADO[n.estado]||n.estado}</span>
        <span class="tag cat">${n.categoria==='barca_atletic'?'🅱️ Barça Atlètic':'⭐ Primer equipo'}</span>
        <span class="src">${n.medio||''}</span>
        <span class="time">${fecha(n.fecha)}</span>
      </div>
    </div>`).join('');
}
function seg(grupo,attr,val){document.querySelectorAll(`#${grupo} .pill`).forEach(b=>
  b.classList.toggle('on',b.dataset[attr]===String(val)));}

document.getElementById('fCat').onclick=e=>{const v=e.target.dataset.cat;if(v){fCat=v;seg('fCat','cat',v);render();}};
document.getElementById('fEst').onclick=e=>{const v=e.target.dataset.est;if(v){fEst=v;seg('fEst','est',v);render();}};
document.getElementById('fTier').onclick=e=>{const v=e.target.dataset.tier;if(v){fTier=+v;seg('fTier','tier',v);render();}};
document.getElementById('q').oninput=e=>{q=e.target.value;render();};

fetch('fichajes.json?_='+Date.now()).then(r=>r.json()).then(d=>{
  DATOS=(d.noticias||[]).filter(n=>n.tier<=4); // en la web ocultamos el 'ruido' (tier 5)
  const pe=DATOS.filter(n=>n.categoria==='primer_equipo').length;
  const ca=DATOS.length-pe;
  document.getElementById('stats').innerHTML=
    `<span><b>${DATOS.length}</b> noticias</span>`+
    `<span>⭐ <b>${pe}</b> primer equipo</span>`+
    `<span>🅱️ <b>${ca}</b> Barça Atlètic</span>`+
    `<span>Actualizado ${d.actualizado?fecha(d.actualizado):'—'}</span>`;
  render();
}).catch(()=>{document.getElementById('stats').textContent='Aún no hay datos.';});
</script>
</body>
</html>
